name: Mail Pull (准实时拉取邮件)

# 2026-07-07:Vercel team 因 functionInvocation 触发 fair-use block。
# 解封并升级/确认预算前,邮件拉取只允许手动触发,避免每 5 分钟继续烧生产函数调用。
on:
  workflow_dispatch: {}

concurrency:
  group: mail-pull
  cancel-in-progress: false

jobs:
  pull:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Trigger mail-pull
        run: |
          echo "Triggering mail-pull at $(date -u)"
          code=$(curl -sS -o /tmp/resp.txt -w "%{http_code}" \
            --max-time 90 \
            "https://erdicrm.com/api/cron/mail-pull?key=${MAIL_CRON_KEY}&n=10" || true)
          echo "HTTP $code"
          echo "----- response -----"
          cat /tmp/resp.txt || true
          echo ""
          # 2xx 视为成功;Vercel 函数 60s 超时导致的客户端超时(空 code)也容忍,因写库幂等
          if [ -n "$code" ] && [ "$code" -ge 200 ] && [ "$code" -lt 300 ]; then
            echo "OK"
          else
            echo "::warning::mail-pull returned HTTP '$code' (may be a server-side timeout; writes are idempotent)"
          fi
        env:
          MAIL_CRON_KEY: ${{ secrets.MAIL_CRON_KEY }}
