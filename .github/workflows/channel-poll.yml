name: Channel Poll (全渠道询盘轮询)

# 2026-07-07:Vercel team 因 functionInvocation 触发 fair-use block。
# 解封并升级/确认预算前,渠道轮询只允许手动触发,避免每 10 分钟继续烧生产函数调用。
on:
  workflow_dispatch: {}

concurrency:
  group: channel-poll
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Trigger channel-poll
        run: |
          echo "Triggering channel-poll at $(date -u)"
          code=$(curl -sS -o /tmp/resp.txt -w "%{http_code}" \
            --max-time 90 \
            "https://erdicrm.com/api/cron/channel-poll?key=${CHANNEL_POLL_KEY}" || true)
          echo "HTTP $code"
          echo "----- response -----"
          cat /tmp/resp.txt || true
          echo ""
          if [ -n "$code" ] && [ "$code" -ge 200 ] && [ "$code" -lt 300 ]; then
            echo "OK"
          else
            echo "::warning::channel-poll returned HTTP '$code' (may be a server-side timeout; writes are idempotent)"
          fi
        env:
          CHANNEL_POLL_KEY: ${{ secrets.CHANNEL_POLL_KEY }}
